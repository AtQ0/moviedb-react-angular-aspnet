<main class="min-h-screen bg-black text-white">
  <!-- Sidebar: fixed when visible, still hidden on small screens -->
  <aside
    class="max-sm:hidden fixed left-0 top-0 bottom-0 z-10 w-64 shrink-0 border-r border-gray-500 flex flex-col items-center py-6"
  >
    <a routerLink="/" class="mb-10">
      <h2 class="text-xl font-semibold">Movies</h2>
    </a>
    <div class="flex-1 flex flex-col justify-center w-full px-4 items-center pb-20">
      <app-nav-links></app-nav-links>
    </div>
  </aside>

  <!-- Right side: no margin on small (sidebar hidden), margin when sidebar visible -->
  <div class="ml-0 sm:ml-64">
    <header class="fixed top-0 left-0 right-0 sm:left-64 z-10 bg-black px-4 py-2">
      <app-header></app-header>
    </header>

    <section class="px-4 pt-14 pb-8">
      <router-outlet></router-outlet>
    </section>
  </div>
</main>
